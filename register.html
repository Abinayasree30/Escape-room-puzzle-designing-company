<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - MystIQ Escape</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="./img/logo1.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page-body register-page-body has-custom-extras">

<div class="login-top-logo">
    <a href="index.html" class="logo-link">
        <img src="./img/logo.png" alt="MystIQ Escape logo">
    </a>
</div>

<main class="login-page">
    <section class="login-panel register-panel">
        <div class="login-panel-content">
            <p class="eyebrow">New Member</p>
            <h1>Create your escape profile</h1>
            <p class="login-copy">Register to manage bookings, save favorite rooms, unlock member offers, and track your next MystIQ challenge.</p>

            <form class="login-form register-form">
                <input type="text" placeholder="Full name" required>
                <input type="email" placeholder="Email address" required>
                <input type="tel" placeholder="Phone number" required>
                <input type="password" placeholder="Create password" required>
                <input type="password" placeholder="Confirm password" required>
                <label class="register-consent" for="registerConsent">
                    <input type="checkbox" id="registerConsent" required>
                    <span>I agree to receive booking updates and member offer alerts.</span>
                </label>
                <button type="submit" class="btn login-submit">Create Account</button>
            </form>

            <p class="login-switch">
                Already have an account?
                <a href="login.html">Login here</a>
            </p>
        </div>

        <div class="login-side-visual register-side-visual">
            <img src="./img/escape-showcase-brand.png" alt="MystIQ Escape registration visual">
        </div>
    </section>
</main>

<script src="js/script.js"></script>
</body>
</html>
